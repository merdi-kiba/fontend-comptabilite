name: proxima
description: PROXIMA Solutions — Plateforme comptable cross-platform (Desktop + Mobile)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ───────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ─────────────────────────────────────────────────────
  go_router: ^15.1.2

  # ── HTTP & API ─────────────────────────────────────────────────────
  dio: ^5.8.0+1

  # ── Stockage (tokens JWT) ───────────────────────────────────────────
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2

  # ── Models & Serialization ─────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── UI Components ──────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # ── Charts (Dashboard KPIs) ────────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Formatage (dates, devises CDF) ─────────────────────────────────
  intl: ^0.20.2

  # ── Utilitaires ────────────────────────────────────────────────────
  equatable: ^2.0.7
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
